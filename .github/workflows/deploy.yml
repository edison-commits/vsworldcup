name: Deploy to Hetzner VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            src
            public
            index.html
            vite.config.js
            package.json
            package-lock.json
            server.js
            server.test.js
            server/proxy.js
            server/proxy.test.js
            ops
          sparse-checkout-cone-mode: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'

      - name: Install, verify, and build
        run: |
          npm ci
          npm audit --omit=dev --audit-level=moderate
          npm test
          node --test server.test.js server/proxy.test.js
          python3 -m unittest ops/auto_tournament_test.py
          python3 -m py_compile ops/auto-tournament.py
          bash -n ops/vsworldcup-healthcheck.sh
          bash -n ops/pocketbase-backup.sh
          bash -n ops/pocketbase-backup.test.sh
          bash ops/pocketbase-backup.test.sh
          npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsworldcup-dist
          path: |
            build/
            server.js
            server/proxy.js

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: vsworldcup-dist
          path: dist

      - name: Copy release bundle to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "dist/build,dist/server.js,dist/server/proxy.js"
          target: /tmp/vsworldcup-release
          strip_components: 1
          rm: true

      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail
            test -f /tmp/vsworldcup-release/server.js
            test -f /tmp/vsworldcup-release/server/proxy.js
            test -d /tmp/vsworldcup-release/build
            rsync -az --delete /tmp/vsworldcup-release/build/ /opt/vsworldcup/vs-worldcup/build/
            install -m 0644 /tmp/vsworldcup-release/server.js /opt/vsworldcup/vs-worldcup/server.js
            install -m 0644 /tmp/vsworldcup-release/server/proxy.js /opt/vsworldcup/api-proxy/server.js
            node --check /opt/vsworldcup/api-proxy/server.js
            systemctl restart vsworldcup-api
            systemctl restart vsworldcup
            sleep 3
            systemctl is-active vsworldcup-api
            systemctl is-active vsworldcup
