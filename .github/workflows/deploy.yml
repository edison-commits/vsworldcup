name: Deploy to Hetzner VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            src
            public
            package.json
            package-lock.json
            server.js
          sparse-checkout-cone-mode: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build
        run: |
          npm ci
          npm run build

      # Upload just the build output, named so it replaces previous artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: vsworldcup-dist
          path: build/
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      # Download to /tmp/dist — artifact contains build/ folder at root
      - uses: actions/download-artifact@v4
        with:
          name: vsworldcup-dist
          path: /tmp/dist

      # Copy build contents to the correct location
      - name: Deploy to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          rm: true
          recursive: true
          source: "/tmp/dist/build/*"
          target: "/opt/vsworldcup/vs-worldcup/build/"

      - name: Restart service
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: systemctl restart vsworldcup
